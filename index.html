<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CybrJsh Lens - Artistic Live Filters</title>
    <style>
        /* General Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #000;
            color: white;
        }

        /* App Container */
        #app-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Canvas */
        canvas {
            display: block;
            width: 100%;
            height: calc(100% - 150px); /* Leaves space for controls */
            background: black;
        }

        /* Controls Section */
        #controls {
            width: 100%;
            height: 150px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.9);
            padding: 10px;
            position: absolute;
            bottom: 0;
            left: 0;
            z-index: 10;
            text-align: center;
        }

        /* Buttons and Dropdown Styling */
        select, button {
            margin: 10px;
            padding: 10px 20px;
            font-size: 14px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            outline: none;
            transition: all 0.2s ease;
        }

        /* Dropdown Style */
        select {
            background: #444;
            color: white;
        }

        /* Button Styles */
        button {
            color: white;
            background: #007BFF;
        }

        button:hover {
            background: #0056b3;
        }

        button:active {
            transform: scale(0.95);
        }

        /* Button Variants */
        #capture-btn {
            background: #28A745;
        }

        #record-btn {
            background: #FFC107;
            color: black;
        }

        #stop-btn {
            background: #DC3545;
        }
    </style>
</head>
<body>

<!-- App Container -->
<div id="app-container">
    <!-- WebGL Canvas -->
    <canvas id="glcanvas"></canvas>

    <!-- Controls Section -->
    <div id="controls">
        <h1 style="color: #fff; font-size: 20px;">CybrJsh Lens</h1>
        <select id="style-selector">
            <option value="0">Ultra-Detailed Colored Pencil Cross-Hatch</option>
            <option value="1">Banknote Engraving Portrait</option>
            <option value="2">Renaissance Graphite Portrait</option>
            <option value="3">Hyperrealistic Charcoal Drawing</option>
            <option value="4">Architectural Pencil Illustration</option>
            <option value="5">Stipple Engraving Portrait</option>
            <option value="6">Comic Book Pencil Realism</option>
            <option value="7">Vintage Sepia Pencil Drawing</option>
            <option value="8">Silverpoint Fine-Line Portrait</option>
            <option value="9">Mixed Media Pencil and Watercolor</option>
        </select>
        <div>
            <button id="capture-btn">Capture Photo</button>
            <button id="record-btn">Start Recording</button>
            <button id="stop-btn" disabled>Stop Recording</button>
        </div>
    </div>
</div>

<!-- TWGL.js Library -->
<script src="https://twgljs.org/dist/4.x/twgl-full.min.js"></script>

<script>
    // DOM Elements
    const canvas = document.getElementById('glcanvas');
    const gl = canvas.getContext('webgl', { preserveDrawingBuffer: true });
    const styleSelector = document.getElementById('style-selector');
    const captureButton = document.getElementById('capture-btn');
    const recordButton = document.getElementById('record-btn');
    const stopButton = document.getElementById('stop-btn');

    if (!gl) {
        alert('WebGL not supported!');
        throw new Error('WebGL not supported!');
    }

    // WebGL Shader Sources
    const vsSource = `
        attribute vec4 a_position;
        attribute vec2 a_texcoord;
        varying vec2 v_texcoord;

        void main() {
            gl_Position = a_position;
            v_texcoord = a_texcoord;
        }
    `;

    const fsSource = `
        precision highp float;

        varying vec2 v_texcoord;
        uniform sampler2D u_image;
        uniform int u_style;

        float random(vec2 st) {
            return fract(sin(dot(st.xy, vec2(12.9898, 78.233))) * 43758.5453123);
        }

        void main() {
            vec4 color = texture2D(u_image, v_texcoord);
            float brightness = dot(color.rgb, vec3(0.299, 0.587, 0.114));
            vec3 finalColor = vec3(1.0);

            if (u_style == 0) {
                float hatch1 = step(0.5, sin(v_texcoord.x * 50.0) * sin(v_texcoord.y * 50.0));
                float hatch2 = step(0.5, cos(v_texcoord.x * 50.0) * cos(v_texcoord.y * 50.0));
                float blend = max(hatch1, hatch2);
                finalColor = mix(vec3(1.0), vec3(0.1, 0.1, 0.1), blend * (1.0 - brightness));
            } else if (u_style == 1) {
                float wave = sin(v_texcoord.x * 100.0) * cos(v_texcoord.y * 100.0);
                float edge = step(0.5, wave);
                finalColor = mix(vec3(0.8, 0.7, 0.5), vec3(0.1), edge * (1.0 - brightness));
            } else if (u_style == 2) {
                finalColor = vec3(1.0 - brightness) * vec3(0.3, 0.3, 0.3);
            } else if (u_style == 3) {
                finalColor = vec3(1.0 - brightness) * vec3(0.1);
            } else if (u_style == 4) {
                finalColor = vec3(brightness > 0.5 ? 0.8 : 0.0);
            }

            gl_FragColor = vec4(finalColor, 1.0);
        }
    `;

    const programInfo = twgl.createProgramInfo(gl, [vsSource, fsSource]);
    const arrays = {
        a_position: { numComponents: 2, data: [-1, -1, 1, -1, -1, 1, 1, 1] },
        a_texcoord: { numComponents: 2, data: [0, 0, 1, 0, 0, 1, 1, 1] },
    };

    const bufferInfo = twgl.createBufferInfoFromArrays(gl, arrays);

    let video = document.createElement('video');
    video.autoplay = true;
    video.playsInline = true;

    let recorder, videoChunks = [];

    async function startCamera() {
        const stream = await navigator.mediaDevices.getUserMedia({ video: true });
        video.srcObject = stream;

        recorder = new MediaRecorder(stream);
        recorder.ondataavailable = (event) => videoChunks.push(event.data);
        recorder.onstop = saveVideo;
    }

    function saveVideo() {
        const blob = new Blob(videoChunks, { type: 'video/mp4' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = 'recorded-video.mp4';
        link.click();
        videoChunks = [];
    }

    function render() {
        if (!video.readyState) {
            requestAnimationFrame(render);
            return;
        }

        gl.viewport(0, 0, gl.canvas.width, gl.canvas.height);
        gl.clear(gl.COLOR_BUFFER_BIT);

        const texture = twgl.createTexture(gl, { src: video });
        gl.useProgram(programInfo.program);
        twgl.setBuffersAndAttributes(gl, programInfo, bufferInfo);
        twgl.setUniforms(programInfo, {
            u_image: texture,
            u_style: parseInt(styleSelector.value),
        });
        twgl.drawBufferInfo(gl, bufferInfo);

        requestAnimationFrame(render);
    }

    captureButton.addEventListener('click', () => {
        const link = document.createElement('a');
        link.download = 'captured-image.png';
        link.href = canvas.toDataURL();
        link.click();
    });

    recordButton.addEventListener('click', () => {
        recorder.start();
        recordButton.disabled = true;
        stopButton.disabled = false;
    });

    stopButton.addEventListener('click', () => {
        recorder.stop();
        recordButton.disabled = false;
        stopButton.disabled = true;
    });

    startCamera();
    render();
</script>

</body>
</html>
