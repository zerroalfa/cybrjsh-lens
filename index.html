<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CybrJsh Lens - Artistic Live Filters</title>
    <style>
        /* General Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #000;
            color: white;
        }

        /* App Container */
        #app-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Canvas */
        canvas {
            display: block;
            width: 100%;
            height: calc(100% - 150px); /* Leaves space for controls */
            background: black;
        }

        /* Controls Section */
        #controls {
            width: 100%;
            height: 150px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.9);
            padding: 10px;
            position: absolute;
            bottom: 0;
            left: 0;
            z-index: 10;
            text-align: center;
        }

        /* Buttons and Dropdown Styling */
        select, button {
            margin: 10px;
            padding: 10px 20px;
            font-size: 14px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            outline: none;
            transition: all 0.2s ease;
        }

        /* Dropdown Style */
        select {
            background: #444;
            color: white;
        }

        /* Button Styles */
        button {
            color: white;
            background: #007BFF;
        }

        button:hover {
            background: #0056b3;
        }

        button:active {
            transform: scale(0.95);
        }

        /* Button Variants */
        #capture-btn {
            background: #28A745;
        }

        #record-btn {
            background: #FFC107;
            color: black;
        }

        #stop-btn {
            background: #DC3545;
        }
    </style>
</head>
<body>

<!-- App Container -->
<div id="app-container">
    <!-- WebGL Canvas -->
    <canvas id="glcanvas"></canvas>

    <!-- Controls Section -->
    <div id="controls">
        <h1 style="color: #fff; font-size: 20px;">CybrJsh Lens</h1>
        <select id="style-selector">
            <option value="0">Ultra-Detailed Colored Pencil Cross-Hatch</option>
            <option value="1">Banknote Engraving Portrait</option>
            <option value="2">Renaissance Graphite Portrait</option>
            <option value="3">Hyperrealistic Charcoal Drawing</option>
            <option value="4">Architectural Pencil Illustration</option>
            <option value="5">Stipple Engraving Portrait</option>
            <option value="6">Comic Book Pencil Realism</option>
            <option value="7">Vintage Sepia Pencil Drawing</option>
            <option value="8">Silverpoint Fine-Line Portrait</option>
            <option value="9">Mixed Media Pencil and Watercolor</option>
        </select>
        <div>
            <button id="capture-btn">Capture Photo</button>
            <button id="record-btn">Start Recording</button>
            <button id="stop-btn" disabled>Stop Recording</button>
        </div>
    </div>
</div>

<!-- TWGL.js Library -->
<script src="https://twgljs.org/dist/4.x/twgl-full.min.js"></script>

<script>
    // DOM Elements
    const canvas = document.getElementById('glcanvas');
    const gl = canvas.getContext('webgl', { preserveDrawingBuffer: true });
    if (!gl) {
        alert('WebGL not supported!');
        throw new Error('WebGL not supported!');
    }

    // Shader Sources
    const vsSource = `
        attribute vec4 a_position;
        attribute vec2 a_texcoord;
        varying vec2 v_texcoord;

        void main() {
            gl_Position = a_position;
            v_texcoord = a_texcoord;
        }
    `;

    const fsSource = `
        precision highp float;

        varying vec2 v_texcoord;
        uniform sampler2D u_image;
        uniform int u_style;

        void main() {
            vec4 color = texture2D(u_image, v_texcoord);
            float brightness = dot(color.rgb, vec3(0.299, 0.587, 0.114));
            vec3 finalColor = vec3(1.0);

            if (u_style == 0) {
                // Ultra-Detailed Colored Pencil Cross-Hatch
                float hatch1 = step(0.5, sin(v_texcoord.x * 50.0) * sin(v_texcoord.y * 50.0));
                float hatch2 = step(0.5, cos(v_texcoord.x * 50.0) * cos(v_texcoord.y * 50.0));
                float blend = max(hatch1, hatch2);
                finalColor = mix(vec3(1.0), vec3(0.1, 0.1, 0.1), blend * (1.0 - brightness));
            }

            gl_FragColor = vec4(finalColor, 1.0);
        }
    `;

    // TWGL Program
    const programInfo = twgl.createProgramInfo(gl, [vsSource, fsSource]);

    // Full-screen Quad
    const arrays = {
        a_position: { numComponents: 2, data: [-1, -1, 1, -1, -1, 1, 1, 1] },
        a_texcoord: { numComponents: 2, data: [0, 0, 1, 0, 0, 1, 1, 1] },
    };
    const bufferInfo = twgl.createBufferInfoFromArrays(gl, arrays);

    // Video Setup
    const video = document.createElement('video');
    video.autoplay = true;
    video.playsInline = true;
    let videoTexture;

    // Start Camera Feed
    async function startCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            video.srcObject = stream;

            // Create WebGL Video Texture
            videoTexture = twgl.createTexture(gl, {
                target: gl.TEXTURE_2D,
                wrapS: gl.CLAMP_TO_EDGE,
                wrapT: gl.CLAMP_TO_EDGE,
                min: gl.LINEAR,
                mag: gl.LINEAR,
            });

            render();
        } catch (err) {
            alert('Failed to access camera: ' + err.message);
        }
    }

    // Render Loop
    function render() {
        if (!video.readyState) {
            requestAnimationFrame(render);
            return;
        }

        // Update Video Texture on Every Frame
        gl.bindTexture(gl.TEXTURE_2D, videoTexture);
        gl.texImage2D(
            gl.TEXTURE_2D,
            0,
            gl.RGBA,
            gl.RGBA,
            gl.UNSIGNED_BYTE,
            video
        );

        // Clear Canvas
        gl.viewport(0, 0, canvas.width, canvas.height);
        gl.clear(gl.COLOR_BUFFER_BIT);

        // Use Shader Program
        gl.useProgram(programInfo.program);
        twgl.setBuffersAndAttributes(gl, programInfo, bufferInfo);

        // Pass Uniforms
        twgl.setUniforms(programInfo, {
            u_image: videoTexture,
            u_style: parseInt(styleSelector.value),
        });

        // Draw Scene
        twgl.drawBufferInfo(gl, bufferInfo);

        // Loop Rendering
        requestAnimationFrame(render);
    }

    // Handle Photo Capture
    const captureButton = document.getElementById('capture-btn');
    captureButton.addEventListener('click', () => {
        const link = document.createElement('a');
        link.download = 'captured-image.png';
        link.href = canvas.toDataURL();
        link.click();
    });

    // Initialize Camera and App
    startCamera();
</script>

</body>
</html>
